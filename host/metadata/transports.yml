transports:
  1:
    label: "uart"
    driver: "uart"
    key_param: "port"
    params:
      port: { type: "str", default: "COM4", required: true }
      baudrate:
        type: "int"
        default: 115200
        choices: [9600, 19200, 38400, 57600, 115200, 230400, 460800, 921600]
      timeout: { type: "float", default: 0.1 }
    supports_streaming: true

  2:
    label: "usb"
    driver: "usb"
    key_param: "port"
    params:
      port: { type: "str", default: "COM6", required: true }
      read_timeout: { type: "float", default: 0.05 }
      write_timeout: { type: "float", default: 1.0 }
      assert_dtr: { type: "bool", default: false }
    supports_streaming: true

  3:
    label: "tcp"
    driver: "tcp"
    key_param: "ip"
    params:
      ip: { type: "str", default: "127.0.0.1", required: true }
      port: { type: "int", default: 9000, required: true }
      timeout: { type: "float", default: 0.1 }
      connect_timeout: { type: "float", default: 3.0 }
      tcp_nodelay: { type: "bool", default: true }
    supports_streaming: true
